<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentryInsight Report Archive</title>
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --border: #e2e8f0;
            --accent: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
        }
        main {
            width: min(960px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 40px 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }
        h1 {
            margin: 0;
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            line-height: 1.1;
        }
        p {
            color: var(--muted);
            margin: 8px 0 0;
        }
        label {
            color: var(--muted);
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        input {
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font: inherit;
            padding: 10px 12px;
            width: 100%;
        }
        a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
        .archive-focus-target:focus-visible {
            outline: 3px solid #2563eb;
            outline-offset: 3px;
        }
        .back {
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 8px 12px;
            white-space: nowrap;
        }
        .archive-list {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }
        .archive-results {
            margin-top: 16px;
        }
        .archive-results .archive-list {
            margin-top: 0;
        }
        .archive-summary {
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 700;
            margin: 12px 0 16px;
        }
        .archive-coverage-summary {
            color: var(--muted);
            font-size: 0.88rem;
            margin-top: -8px;
            max-width: 680px;
        }
        .archive-section-index {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: -8px 0 18px;
        }
        .archive-section-index a {
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.84rem;
            font-weight: 700;
            padding: 5px 9px;
        }
        .archive-section-index a:hover {
            text-decoration: none;
        }
        #archive-summary, #archive-filter-panel, #archive-results {
            scroll-margin-top: 32px;
        }
        .archive-filter {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 0 0 16px;
            padding: 14px;
        }
        .archive-count {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .archive-filter-summary {
            color: var(--muted);
            font-size: 0.86rem;
            line-height: 1.45;
            margin-top: 6px;
        }
        .archive-topic-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0 0;
        }
        .archive-topic-filters button {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text);
            cursor: pointer;
            font: inherit;
            font-size: 0.84rem;
            font-weight: 700;
            padding: 5px 10px;
        }
        .archive-topic-filters button[aria-pressed="true"] {
            background: #fee2e2;
            border-color: #fca5a5;
            color: #991b1b;
        }
        .archive-topic-count {
            color: var(--muted);
            margin-left: 4px;
        }
        .archive-topic-filters button[aria-pressed="true"] .archive-topic-count {
            color: #991b1b;
        }
        .archive-clear-filters {
            background: transparent;
            border: 0;
            color: var(--accent);
            cursor: pointer;
            font: inherit;
            font-size: 0.86rem;
            font-weight: 700;
            margin: 10px 0 0;
            padding: 0;
        }
        .archive-clear-filters:disabled {
            color: var(--muted);
            cursor: default;
            opacity: 0.65;
        }
        .archive-item {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
        .archive-item h2 {
            font-size: 1.1rem;
            margin: 0 0 4px;
        }
        .archive-meta {
            color: var(--muted);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 0.86rem;
            font-weight: 600;
            margin: 0 0 8px;
        }
        .archive-item p { margin: 0; }
        .archive-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 12px 0 0;
        }
        .archive-metric {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 3px 8px;
        }
        .archive-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0 0;
        }
        .archive-action {
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.86rem;
            font-weight: 700;
            padding: 5px 9px;
        }
        .archive-action:first-child {
            background: #0f172a;
            border-color: #0f172a;
            color: #ffffff;
        }
        .archive-action:hover {
            text-decoration: none;
        }
        .archive-coverage {
            border-left: 3px solid var(--border);
            display: grid;
            gap: 6px;
            margin: 12px 0 0;
            padding-left: 10px;
        }
        .archive-coverage-heading {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .archive-coverage-note {
            color: var(--muted);
            font-size: 0.86rem;
            margin: 0;
        }
        .archive-coverage-note strong {
            color: var(--text);
        }
        .archive-artifacts {
            margin: 12px 0 0;
            overflow-x: auto;
        }
        .archive-artifact-table {
            border-collapse: collapse;
            font-size: 0.84rem;
            min-width: 320px;
            width: 100%;
        }
        .archive-artifact-table th,
        .archive-artifact-table td {
            border-bottom: 1px solid var(--border);
            padding: 6px 0;
            text-align: left;
            vertical-align: top;
        }
        .archive-artifact-table th {
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .archive-artifact-table td:first-child {
            color: var(--text);
            font-weight: 700;
            padding-right: 12px;
            white-space: nowrap;
        }
        .archive-artifact-table a {
            overflow-wrap: anywhere;
        }
        .archive-tags {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        .archive-tag-label {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            margin-right: 2px;
        }
        .archive-tag {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 999px;
            color: #991b1b;
            cursor: pointer;
            font: inherit;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 3px 8px;
        }
        .archive-tag:hover {
            background: #fecaca;
        }
        .archive-empty {
            background: var(--panel);
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--muted);
            margin-top: 12px;
            padding: 16px;
        }
        .archive-empty p {
            margin: 0;
        }
        .archive-empty-clear {
            background: #0f172a;
            border: 1px solid #0f172a;
            border-radius: 8px;
            color: #ffffff;
            cursor: pointer;
            font: inherit;
            font-size: 0.86rem;
            font-weight: 700;
            margin-top: 10px;
            padding: 6px 10px;
        }
        [hidden] { display: none !important; }
        @media (max-width: 560px) {
            header {
                align-items: flex-start;
                flex-direction: column;
            }
            .back { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <div>
                <h1>Report Archive</h1>
                <p>Previous SentryInsight exploitation reports.</p>
                <div class="archive-summary" id="archive-summary"></div>
                <div class="archive-coverage-summary" id="archive-coverage-summary"></div>
            </div>
            <a class="back" href="../index.html">Latest report</a>
        </header>
        <nav class="archive-section-index" aria-label="Archive sections">
            <a class="archive-focus-target" href="#archive-summary">Latest</a>
            <a class="archive-focus-target" href="#archive-filter-panel">Filter</a>
            <a class="archive-focus-target" href="#archive-results">Reports</a>
        </nav>
        <div class="archive-filter" id="archive-filter-panel">
            <label for="archive-filter">Filter archived reports</label>
            <input id="archive-filter" type="search" autocomplete="off" placeholder="Search CVEs, vendors, products, or campaigns" />
            <div class="archive-topic-filters" id="archive-topic-filters" aria-label="Filter by report topic"></div>
            <button class="archive-clear-filters" id="archive-clear-filters" type="button" disabled>Clear filters</button>
            <div class="archive-count" id="archive-count">1 report available</div>
            <div class="archive-filter-summary" id="archive-filter-summary" aria-live="polite">Showing all archived reports.</div>
        </div>
        <section class="archive-results" id="archive-results" aria-label="Available reports">
            <div class="archive-list" id="archive-list"></div>
            <div class="archive-empty" id="archive-empty" hidden>
                <p>No archived reports match that filter.</p>
                <button class="archive-empty-clear archive-focus-target" id="archive-empty-clear" type="button">Clear filters</button>
            </div>
        </section>
    </main>
    <script>
        const archiveReports = [
            {
                title: 'Exploitation report: CitrixBleed 2, LapDogs routers, and MOVEit scanning',
                href: '../index.html?report=reports/index.md',
                path: 'reports/index.md',
                archivedAt: '2026-06-23',
                archivedLabel: 'Jun 23, 2026',
                summary: 'Archived generated report covering active exploitation of network-edge infrastructure and file-transfer systems.',
                topics: ['CVE-2025-5777', 'NetScaler', 'LapDogs', 'MOVEit'],
                metrics: {
                    sections: 6,
                    topics: 4,
                    uncertaintySignals: 1,
                },
                links: {
                    report: '../index.html?report=reports/index.md',
                    markdown: 'index.md',
                },
                coverage: [
                    {
                        label: 'Source attribution',
                        detail: 'No source attribution section is present in this archived markdown.',
                    },
                    {
                        label: 'Archived artifact',
                        detail: 'Rendered report and source markdown are both available from this archive card.',
                    },
                ],
                search: 'exploitation report citrixbleed netscaler cve-2025-5777 lapdogs soho routers moveit transfer',
            },
        ];
        const archiveFilterEl = document.getElementById('archive-filter');
        const archiveFilterSummaryEl = document.getElementById('archive-filter-summary');
        const archiveSummaryEl = document.getElementById('archive-summary');
        const archiveCoverageSummaryEl = document.getElementById('archive-coverage-summary');
        const archiveCountEl = document.getElementById('archive-count');
        const archiveEmptyEl = document.getElementById('archive-empty');
        const archiveEmptyClearEl = document.getElementById('archive-empty-clear');
        const archiveListEl = document.getElementById('archive-list');
        const archiveTopicFiltersEl = document.getElementById('archive-topic-filters');
        const archiveClearFiltersEl = document.getElementById('archive-clear-filters');
        let archiveTopicButtons = [];
        let archiveItems = [];
        let activeTopic = '';

        function createArchiveTopicButton(topic, total, pressed) {
            const button = document.createElement('button');
            button.type = 'button';
            button.classList.add('archive-focus-target');
            button.dataset.topic = topic;
            button.setAttribute('aria-pressed', String(pressed));
            const label = document.createElement('span');
            label.textContent = topic || 'All';
            const count = document.createElement('span');
            count.className = 'archive-topic-count';
            count.textContent = String(total);
            button.append(label, ' ', count);
            return button;
        }

        function renderArchiveSummary() {
            const topics = new Set(archiveReports.flatMap(report => report.topics));
            const reportTotal = archiveReports.length;
            const topicTotal = topics.size;
            const latestReport = archiveReports
                .slice()
                .sort((a, b) => b.archivedAt.localeCompare(a.archivedAt))[0];
            if (!latestReport) {
                archiveSummaryEl.textContent = 'No archived reports yet';
                return;
            }
            archiveSummaryEl.textContent = `${reportTotal} ${reportTotal === 1 ? 'archived report' : 'archived reports'} · ${topicTotal} ${topicTotal === 1 ? 'tracked topic' : 'tracked topics'} · Latest archive: `;
            const latestArchiveLink = document.createElement('a');
            latestArchiveLink.classList.add('archive-focus-target');
            latestArchiveLink.href = latestReport.href;
            latestArchiveLink.textContent = latestReport.archivedLabel;
            archiveSummaryEl.appendChild(latestArchiveLink);
        }

        function renderArchiveCoverageSummary() {
            if (!archiveReports.length) {
                archiveCoverageSummaryEl.textContent = 'Coverage notes will appear when archived reports are available.';
                return;
            }
            const sourceAttributionGaps = archiveReports.filter(report =>
                (report.coverage || []).some(({ label, detail }) =>
                    label === 'Source attribution' && /no source attribution/i.test(detail || '')
                )
            ).length;
            const artifactTotal = archiveReports.reduce((total, report) => total + Object.keys(report.links || {}).length, 0);
            const gapText = `${sourceAttributionGaps} ${sourceAttributionGaps === 1 ? 'source attribution gap' : 'source attribution gaps'}`;
            const artifactText = `${artifactTotal} ${artifactTotal === 1 ? 'archive artifact tracked' : 'archive artifacts tracked'}`;
            archiveCoverageSummaryEl.textContent = `Coverage: ${gapText} · ${artifactText}.`;
        }

        function renderArchiveTopicFilters() {
            const topics = Array.from(new Set(archiveReports.flatMap(report => report.topics)));
            const topicCounts = new Map();
            archiveReports.forEach(report => {
                report.topics.forEach(topic => {
                    topicCounts.set(topic, (topicCounts.get(topic) || 0) + 1);
                });
            });
            const fragment = document.createDocumentFragment();
            fragment.appendChild(createArchiveTopicButton('', archiveReports.length, true));
            topics.forEach(topic => {
                fragment.appendChild(createArchiveTopicButton(topic, topicCounts.get(topic) || 0, false));
            });
            archiveTopicFiltersEl.innerHTML = '';
            archiveTopicFiltersEl.appendChild(fragment);
            archiveTopicButtons = Array.from(archiveTopicFiltersEl.querySelectorAll('button'));
            archiveTopicButtons.forEach(button => {
                button.addEventListener('click', () => filterArchiveByTopic(button.dataset.topic || ''));
            });
        }

        const archiveMetricLabels = {
            sections: 'Archive sections',
            topics: 'Tracked topics',
            uncertaintySignals: 'Uncertainty signals',
        };

        function buildArchiveMetricChips(report) {
            const metrics = document.createElement('div');
            metrics.className = 'archive-metrics';
            Object.entries(report.metrics || {}).forEach(([key, value]) => {
                const label = archiveMetricLabels[key];
                if (!label && label !== '') return;
                const chip = document.createElement('span');
                chip.className = 'archive-metric';
                chip.textContent = `${label}: ${value}`;
                metrics.appendChild(chip);
            });
            return metrics;
        }

        function buildArchiveActionLinks(report) {
            const actions = document.createElement('div');
            actions.className = 'archive-actions';
            [
                ['Open report', report.links?.report],
                ['Source markdown', report.links?.markdown],
            ].forEach(([label, href]) => {
                if (!href) return;
                const action = document.createElement('a');
                action.className = 'archive-action';
                action.classList.add('archive-focus-target');
                action.href = href;
                action.textContent = label;
                actions.appendChild(action);
            });
            return actions;
        }

        function buildArchiveCoverageNotes(report) {
            const coverage = report.coverage || [];
            const notes = document.createElement('div');
            notes.className = 'archive-coverage';
            if (!coverage.length) return notes;
            const heading = document.createElement('div');
            heading.className = 'archive-coverage-heading';
            heading.textContent = 'Coverage';
            notes.appendChild(heading);
            coverage.forEach(({ label, detail }) => {
                if (!label || !detail) return;
                const note = document.createElement('p');
                note.className = 'archive-coverage-note';
                const strong = document.createElement('strong');
                strong.textContent = `${label}: `;
                note.append(strong, detail);
                notes.appendChild(note);
            });
            return notes;
        }

        const archiveArtifactLabels = {
            report: 'Rendered report',
            markdown: 'Source markdown',
        };

        function buildArchiveArtifactRows(report) {
            const artifacts = document.createElement('div');
            artifacts.className = 'archive-artifacts';
            const table = document.createElement('table');
            table.className = 'archive-artifact-table';
            const thead = document.createElement('thead');
            const header = document.createElement('tr');
            ['Artifact', 'Path'].forEach(label => {
                const cell = document.createElement('th');
                cell.scope = 'col';
                cell.textContent = label;
                header.appendChild(cell);
            });
            thead.appendChild(header);
            const tbody = document.createElement('tbody');
            Object.entries(report.links || {}).forEach(([key, href]) => {
                const label = archiveArtifactLabels[key];
                if (!label || !href) return;
                const row = document.createElement('tr');
                const labelCell = document.createElement('td');
                labelCell.textContent = label;
                const pathCell = document.createElement('td');
                const link = document.createElement('a');
                link.classList.add('archive-focus-target');
                link.href = href;
                link.textContent = href;
                pathCell.appendChild(link);
                row.append(labelCell, pathCell);
                tbody.appendChild(row);
            });
            table.append(thead, tbody);
            artifacts.appendChild(table);
            return artifacts;
        }

        function renderArchiveReports() {
            const fragment = document.createDocumentFragment();
            archiveReports.forEach(report => {
                const article = document.createElement('article');
                article.className = 'archive-item';
                article.dataset.date = report.archivedAt;
                article.dataset.search = `${report.title} ${report.summary} ${report.topics.join(' ')} ${report.search}`;

                const heading = document.createElement('h2');
                const link = document.createElement('a');
                link.classList.add('archive-focus-target');
                link.href = report.href;
                link.textContent = report.title;
                heading.appendChild(link);
                article.appendChild(heading);

                const meta = document.createElement('div');
                meta.className = 'archive-meta';
                meta.append('Archived ');
                const time = document.createElement('time');
                time.dateTime = report.archivedAt;
                time.textContent = report.archivedLabel;
                meta.appendChild(time);
                article.appendChild(meta);

                const summary = document.createElement('p');
                summary.textContent = report.summary;
                article.appendChild(summary);
                article.appendChild(buildArchiveMetricChips(report));
                article.appendChild(buildArchiveCoverageNotes(report));
                article.appendChild(buildArchiveArtifactRows(report));
                article.appendChild(buildArchiveActionLinks(report));

                const tags = document.createElement('div');
                tags.className = 'archive-tags';
                tags.setAttribute('aria-label', 'Report topics');
                const archiveTagLabel = document.createElement('span');
                archiveTagLabel.className = 'archive-tag-label';
                archiveTagLabel.textContent = 'Topics';
                tags.appendChild(archiveTagLabel);
                report.topics.forEach(topic => {
                    const tag = document.createElement('button');
                    tag.className = 'archive-tag';
                    tag.classList.add('archive-focus-target');
                    tag.type = 'button';
                    tag.textContent = topic;
                    tag.addEventListener('click', () => filterArchiveByTopic(topic));
                    tags.appendChild(tag);
                });
                article.appendChild(tags);
                fragment.appendChild(article);
            });
            archiveListEl.innerHTML = '';
            archiveListEl.appendChild(fragment);
            archiveItems = Array.from(document.querySelectorAll('.archive-item'));
        }

        function sortNewestFirst() {
            archiveItems
                .slice()
                .sort((a, b) => (b.dataset.date || '').localeCompare(a.dataset.date || ''))
                .forEach(item => archiveListEl.appendChild(item));
        }

        function readArchiveQueryState() {
            const params = new URLSearchParams(window.location.search);
            return {
                query: (params.get('q') || '').trim(),
                topic: (params.get('topic') || '').trim(),
            };
        }

        function writeArchiveQueryState() {
            const query = archiveFilterEl.value.trim();
            const params = new URLSearchParams(window.location.search);
            if (query) {
                params.set('q', query);
            } else {
                params.delete('q');
            }
            if (activeTopic) {
                params.set('topic', activeTopic);
            } else {
                params.delete('topic');
            }
            const nextSearch = params.toString();
            const nextUrl = `${window.location.pathname}${nextSearch ? `?${nextSearch}` : ''}${window.location.hash}`;
            history.replaceState(null, '', nextUrl);
        }

        function normalizeArchiveTopic(topic) {
            if (!topic) return '';
            return archiveReports.some(report => report.topics.includes(topic)) ? topic : '';
        }

        function renderArchiveFilterSummary(query, visible, total) {
            if (!query && !activeTopic) {
                archiveFilterSummaryEl.textContent = 'Showing all archived reports.';
                return;
            }
            const filters = [];
            if (activeTopic) filters.push(`topic ${activeTopic}`);
            if (query) filters.push(`search "${query}"`);
            archiveFilterSummaryEl.textContent = `Filtering by ${filters.join(' and ')}. ${visible} of ${total} ${total === 1 ? 'report' : 'reports'} visible.`;
        }

        function filterArchive(options = {}) {
            const { syncQuery = true } = options;
            const query = archiveFilterEl.value.trim().toLowerCase();
            let visible = 0;
            archiveItems.forEach(item => {
                const haystack = `${item.textContent} ${item.dataset.search || ''}`.toLowerCase();
                const matchesQuery = !query || haystack.includes(query);
                const matchesTopic = !activeTopic || haystack.includes(activeTopic.toLowerCase());
                const match = matchesQuery && matchesTopic;
                item.hidden = !match;
                if (match) visible += 1;
            });
            archiveCountEl.textContent = `${visible} ${visible === 1 ? 'report' : 'reports'} shown`;
            renderArchiveFilterSummary(query, visible, archiveItems.length);
            archiveEmptyEl.hidden = visible !== 0;
            archiveClearFiltersEl.disabled = !query && !activeTopic;
            if (syncQuery) writeArchiveQueryState();
        }

        function filterArchiveByTopic(topic, options = {}) {
            activeTopic = normalizeArchiveTopic(topic);
            archiveTopicButtons.forEach(button => {
                button.setAttribute('aria-pressed', String(button.dataset.topic === activeTopic));
            });
            filterArchive(options);
        }

        function applyArchiveQueryState() {
            const { query, topic } = readArchiveQueryState();
            archiveFilterEl.value = query;
            filterArchiveByTopic(topic, { syncQuery: false });
        }

        function clearArchiveFilters() {
            archiveFilterEl.value = '';
            filterArchiveByTopic('');
        }

        archiveFilterEl.addEventListener('input', () => filterArchive());
        archiveClearFiltersEl.addEventListener('click', clearArchiveFilters);
        archiveEmptyClearEl.addEventListener('click', clearArchiveFilters);
        renderArchiveSummary();
        renderArchiveCoverageSummary();
        renderArchiveReports();
        renderArchiveTopicFilters();
        sortNewestFirst();
        applyArchiveQueryState();
    </script>
</body>
</html>
