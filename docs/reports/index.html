<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentryInsight Report Archive</title>
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --border: #e2e8f0;
            --accent: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
        }
        main {
            width: min(960px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 40px 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }
        h1 {
            margin: 0;
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            line-height: 1.1;
        }
        p {
            color: var(--muted);
            margin: 8px 0 0;
        }
        a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
        .back {
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 8px 12px;
            white-space: nowrap;
        }
        .archive-list {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }
        .archive-item {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
        .archive-item h2 {
            font-size: 1.1rem;
            margin: 0 0 4px;
        }
        .archive-item p { margin: 0; }
        @media (max-width: 560px) {
            header {
                align-items: flex-start;
                flex-direction: column;
            }
            .back { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <div>
                <h1>Report Archive</h1>
                <p>Previous SentryInsight exploitation reports.</p>
            </div>
            <a class="back" href="../index.html">Latest report</a>
        </header>
        <section class="archive-list" aria-label="Available reports">
            <article class="archive-item">
                <h2><a href="index.md">Exploitation report archive entry</a></h2>
                <p>Archived report artifact preserved from the generated report output.</p>
            </article>
        </section>
    </main>
</body>
</html>
