name: Generate Exploitation Report

on:
  # Run when triggered by SentryDigest repository
  repository_dispatch:
    types: [sentrydigest-updated]
  
  # Schedule backup run (in case webhook fails)
  schedule:
    - cron: '30 */12 * * *'  # Run every 12 hours, offset by 30 minutes
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_GITHUB }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      
      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run local validation
        run: bash scripts/local_validation.sh
      
      - name: Generate exploitation report
        run: uv run python main.py
        env:
          # Report generation calls OpenRouter directly (free model default);
          # no local OpenCode gateway is needed in CI.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SENTRYINSIGHT_MODEL: ${{ vars.SENTRYINSIGHT_MODEL || 'openrouter/nvidia/nemotron-3-ultra-550b-a55b:free' }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          # Pass VT Intelligence API key under multiple common env names
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          VT_INTELLIGENCE_API_KEY: ${{ secrets.VT_INTELLIGENCE_API_KEY }}
          GOOGLE_TI_API_KEY: ${{ secrets.GOOGLE_TI_API_KEY }}
      
      - name: Validate report content before publishing
        run: |
          uv run python scripts/validate_report.py index.md
          uv run python scripts/validate_report.py docs/index.md

      - name: Commit and push updated report
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          # Force add report files
          git add -f index.md || true
          git add -f index.html || true
          git add -f executive_summary.mp3 || true
          if [ -d docs ]; then
            git add -f docs/index.md || true
            git add -f docs/index.html || true
            git add -f docs/executive_summary.mp3 || true
          fi
          if git diff --cached --quiet; then
            echo "No report changes to commit"
            exit 0
          fi
          git commit -m "Update exploitation report [automated]"
          git pull --rebase origin main
          git push https://${{ secrets.PAT_GITHUB }}@github.com/${{ github.repository }}.git HEAD:main
